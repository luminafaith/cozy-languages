<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <!-- <link rel="icon" href="%PUBLIC_URL%/favicon.ico" /> -->
         <meta name="viewport" content="width=device-width, initial-scale=1">
         <title>Coziest Languages</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
        <link rel="stylesheet" href="src/styles/style.css">
        
    </head>
    <body>
        <div class="jumbotron text-center">
          some image related to the game that isn't the logo
          <h1>Coziest Languages</h1>
          <p>Look up text in other languages for some coziest game.</p> 
        </div>
        <div class="container">
          <div class="row">
            <div class="col text-end">
              <div id="VersionSelect" class="container">
                <select id="verSelect" name="verSelect" class="form-select">
                  <option value="" selected disabled hidden>Select Version</option>
                  <option value="1.0">1.0</option>
                  <option value="1.1">1.1</option>
                  <option value="1.2">1.2</option>
                  <option value="1.3">1.3</option>
                  <option value="1.4">1.4</option>
                  <option value="1.5">1.5</option>
                  <option value="1.6">1.6</option>
                  <option value="1.7">1.7</option>
                  <option value="1.8">1.8</option>
                  <option value="1.9">1.9</option>
                </select>
              </div>
            </div>
            <div class="col">
              <div id="LangSelect" class="container">
                <select id="langSelect" name="langSelect" class="form-select">
                  <option value="" selected disabled hidden>Select Language</option>
                  <option value="en">English (EN)</option>
                  <option value="de">German (DE)</option>
                  <option value="es">Spanish - Latin America (ES)</option>
                  <option value="fr">French (FR)</option>
                  <option value="id">Indonesian (ID)</option>
                  <option value="it">Italian (IT)</option>
                  <option value="ja-JP">Japanese (JP)</option>
                  <option value="ko">Korean (KO)</option>
                  <option value="pt">Portuguese - Brazil (PT)</option>
                  <option value="th">Thai (TH)</option>
                  <option value="zh">Simplified Chinese (ZH)</option>
                  <option value="zh-Hant">Traditional Chinese (ZH-Hant)</option>
                </select>
              </div>
            </div>
        </div>
        <br>
        <div class="input-group mb-3">
          <button class="btn btn-outline-secondary" type="button" id="button-addon1" onclick="populateResultDisplay('textField', 'displayResults', 'verSelect', 'langSelect')">Click here to search for:</button>
          <input type="text" id="textField" class="form-control" name="textField" placeholder="" aria-label="Example text with button addon" aria-describedby="button-addon1">
        </div>
        <div class="container">
          <h1>Results:</h1>
          <div id="displayResults" class="accordion">
            <div class="accordion-item">
              <h2 class="accordion-header" id="flush-heading1">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#flush-collapse1" aria-expanded="false" aria-controls="flush-collapse1">
                  Result #1
                </button>
              </h2>
              <div id="flush-collapse1" class="accordion-collapse collapse" aria-labelledby="flush-heading1" data-bs-parent="#displayResults">
                <div class="accordion-body">
                  <button class="btn btn-outline-secondary" type="button" id="button-copyWT" onclick="copyToClipboard('result1')">Copy Text</button>
                  <button class="btn btn-outline-secondary" type="button" id="button-copyWT" onclick="copyWTToClipboard('result1')">Copy Wikitext</button>
                  <button class="btn btn-outline-secondary" type="button" id="button-copyStrID">Copy string ID</button>
                  <button class="btn btn-outline-secondary" type="button" id="button-showOL">Show OL</button>
                  <button class="btn btn-outline-secondary" type="button" id="button-copyOL">Copy OL</button>
                  <br><br>
                  <div class="highlight"><pre><code id="result1">skdjhfsd\nskdjfhksdjf</code></pre></div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
        <script src="src/scripts/script.js"></script>
    </body>
</html>
